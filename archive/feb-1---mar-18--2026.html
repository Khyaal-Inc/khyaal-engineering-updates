            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 2px;

        .info-wrapper:hover .info-btn {
            background: #e2e8f0;
            color: #0f172a;
            border-color: #cbd5e1;
        }

        .tooltip-content {
            visibility: hidden;
            width: 280px;
            background-color: #0f172a;
            color: #fff;
            text-align: left;
            border-radius: 8px;
            padding: 12px;
            position: absolute;
            z-index: 50;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            font-size: 0.75rem;
            font-weight: 500;
            line-height: 1.5;
            pointer-events: none;
        }

            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #0f172a transparent transparent transparent;
        }

        .info-wrapper:hover .tooltip-content,
        .info-btn:focus+.tooltip-content {

            opacity: 1;

        const CMS_CONFIG = {
            repoOwner: 'Khyaal-Inc',
            repoName: 'khyaal-engineering-updates',
            filePath: 'index.html'
        };

        function initCms() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('cms') === 'true') {
                isCmsMode = true;
                document.getElementById('cms-controls').classList.add('active');
                
                // Load token if exists
                githubToken = localStorage.getItem('gh_pat') || '';
                if (githubToken) {
                    document.getElementById('github-token').value = githubToken;
                    authenticateCms();
                }
            }
            
            initArchiveFilter();
        }

        function authenticateCms() {
            const token = document.getElementById('github-token').value;
            if (!token) return;
            
            githubToken = token;
            localStorage.setItem('gh_pat', token);
            isAuthenticated = true;
            
            document.getElementById('cms-auth-section').classList.add('hidden');
            document.getElementById('cms-actions-section').classList.remove('hidden');
            
            // Re-render to show edit buttons
            const currentView = document.querySelector('.view-section.active').id.replace('-view', '');
            if (currentView === 'track') renderTrackView();
            if (currentView === 'status') renderStatusView();
            if (currentView === 'contributor') renderContributorView();
        }

        function logoutCms() {
            localStorage.removeItem('gh_pat');
            location.reload();
        }

        async function archiveAndClear() {
            if (!confirm('Are you sure you want to archive all current entries and clear the main page? This is irreversible.')) return;

            const btn = document.getElementById('archive-btn');
            const status = document.getElementById('cms-status');
            btn.disabled = true;
            btn.innerText = 'Archiving...';

            try {
                // 1. Fetch the base file from GitHub. We need this for the template and the latest SHA.
                status.innerText = 'Fetching latest file data from GitHub...';
                const response = await fetch(`https://api.github.com/repos/${CMS_CONFIG.repoOwner}/${CMS_CONFIG.repoName}/contents/${CMS_CONFIG.filePath}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: `HTTP ${response.status} ${response.statusText}` }));
                    throw new Error(`GitHub API Error: ${errorData.message}`);
                }
                const fileData = await response.json();
                const baseContent = atob(fileData.content);

                // 2. Generate the archive content using the CURRENT in-memory data.
                const archiveDataString = JSON.stringify(UPDATE_DATA, null, 12);
                const archiveFileContent = baseContent.replace(
                    /const UPDATE_DATA = \{[\s\S]*?\}\s*;/m,
                    `const UPDATE_DATA = ${archiveDataString};`
                );

                // 3. Commit the archive file.
                const dateRange = UPDATE_DATA.metadata.dateRange.replace(/[^a-z0-9]/gi, '-').toLowerCase();
                const archivePath = `archive/${dateRange}.html`;
                status.innerText = `Creating archive file at ${archivePath}`;
                const archiveResponse = await fetch(`https://api.github.com/repos/${CMS_CONFIG.repoOwner}/${CMS_CONFIG.repoName}/contents/${archivePath}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Archive: ${UPDATE_DATA.metadata.dateRange}`,
                        content: btoa(unescape(encodeURIComponent(archiveFileContent)))
                    })
                });
                if (!archiveResponse.ok) { throw new Error('Failed to create archive file on GitHub.'); }

                // 4. Generate the new, cleared content for the main page.
                const clearedData = JSON.parse(JSON.stringify(UPDATE_DATA)); // Deep copy
                clearedData.tracks.forEach(track => {
                    track.subtracks.forEach(subtrack => {
                        subtrack.items = subtrack.items.filter(item => item.status !== 'done');
                    });
                });
                clearedData.metadata.dateRange = 'New Update - Please set date range';
                const newIndexDataString = JSON.stringify(clearedData, null, 12);
                const newIndexFileContent = baseContent.replace(
                    /const UPDATE_DATA = \{[\s\S]*?\}\s*;/m,
                    `const UPDATE_DATA = ${newIndexDataString};`
                );

                // 5. Commit the cleared index.html using the SHA from the initial fetch.
                status.innerText = 'Clearing main page and committing...';
                const mainUpdateResponse = await fetch(`https://api.github.com/repos/${CMS_CONFIG.repoOwner}/${CMS_CONFIG.repoName}/contents/${CMS_CONFIG.filePath}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'CMS: Clear entries after archive',
                        content: btoa(unescape(encodeURIComponent(newIndexFileContent))),
                        sha: fileData.sha
                    })
                });
                if (!mainUpdateResponse.ok) { throw new Error('Failed to update main page on GitHub.'); }

                status.innerText = 'Archive complete! Reloading...';
                setTimeout(() => location.reload(), 2000);

            } catch (error) {
                console.error(error);
                status.innerText = 'Error: ' + error.message;
                btn.disabled = false;
                btn.innerText = 'Archive & Clear';
            }
        }

        async function saveToGithub() {
            const btn = document.getElementById('save-to-github-btn');
            const status = document.getElementById('cms-status');
            
            try {
                btn.disabled = true;
                btn.innerText = 'Saving...';
                status.innerText = 'Fetching latest content...';

                // 1. Get current file data from GitHub
                const response = await fetch(`https://api.github.com/repos/${CMS_CONFIG.repoOwner}/${CMS_CONFIG.repoName}/contents/${CMS_CONFIG.filePath}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: `HTTP ${response.status} ${response.statusText}` }));
                    throw new Error(`GitHub API Error: ${errorData.message}`);
                }

                const fileData = await response.json();
                if (typeof fileData.content !== 'string') {
                    throw new Error('File content not found in GitHub API response.');
                }
                const content = atob(fileData.content);

                // 2. Replace the UPDATE_DATA object in the content
                const dataString = JSON.stringify(UPDATE_DATA, null, 12);
                const newContent = content.replace(
                    /const UPDATE_DATA = \{[\s\S]*?\}\s*;/m,
                    `const UPDATE_DATA = ${dataString};`
                );

                // 3. Commit the changes
                status.innerText = 'Committing changes...';
                const putResponse = await fetch(`https://api.github.com/repos/${CMS_CONFIG.repoOwner}/${CMS_CONFIG.repoName}/contents/${CMS_CONFIG.filePath}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'CMS: Update content entries',
                        content: btoa(unescape(encodeURIComponent(newContent))),
                        sha: fileData.sha
                    })
                });

                if (putResponse.ok) {
                    status.innerText = 'Saved successfully! Reloading...';
                    setTimeout(() => location.reload(), 2000);
                } else {
                    throw new Error('Failed to save to GitHub');
                }
            } catch (error) {
                console.error(error);
                status.innerText = 'Error: ' + error.message;
                btn.disabled = false;
                btn.innerText = 'Save to GitHub';
            }
        }

        // CRUD Helpers
        function openItemEdit(trackIndex, subtrackIndex, itemIndex) {
            const item = UPDATE_DATA.tracks[trackIndex].subtracks[subtrackIndex].items[itemIndex];
            editContext = { type: 'item', trackIndex, subtrackIndex, itemIndex };
            
            document.getElementById('modal-title').innerText = 'Edit Item';
            document.getElementById('modal-form').innerHTML = `
                <label class="block text-sm font-bold mb-1">Text</label>
                <input type="text" id="edit-text" value="${item.text}" class="cms-input">
                <label class="block text-sm font-bold mb-1">Status</label>
                <select id="edit-status" class="cms-input">
                    <option value="done" ${item.status === 'done' ? 'selected' : ''}>Done</option>
                    <option value="now" ${item.status === 'now' ? 'selected' : ''}>Now</option>
                    <option value="ongoing" ${item.status === 'ongoing' ? 'selected' : ''}>On-Going</option>
                    <option value="next" ${item.status === 'next' ? 'selected' : ''}>Next</option>
                    <option value="later" ${item.status === 'later' ? 'selected' : ''}>Later</option>
                </select>
                <label class="block text-sm font-bold mb-1">Contributors (comma separated)</label>
                <input type="text" id="edit-contributors" value="${item.contributors.join(', ')}" class="cms-input">
                <label class="block text-sm font-bold mb-1">Note</label>
                <textarea id="edit-note" class="cms-input">${item.note || ''}</textarea>
                <label class="block text-sm font-bold mb-1">Impact/Usecase</label>
                <input type="text" id="edit-usecase" value="${item.usecase || ''}" class="cms-input">
                <label class="block text-sm font-bold mb-1">Due Date (Optional)</label>
                <input type="text" id="edit-due" value="${item.due || ''}" class="cms-input">
            `;
            document.getElementById('cms-modal').classList.add('active');
        }

        function deleteItem(trackIndex, subtrackIndex, itemIndex) {
            if (confirm('Are you sure you want to delete this item?')) {
                UPDATE_DATA.tracks[trackIndex].subtracks[subtrackIndex].items.splice(itemIndex, 1);
                renderTrackView();
            }
        }

        function addItem(trackIndex, subtrackIndex) {
            editContext = { type: 'item-new', trackIndex, subtrackIndex };
            document.getElementById('modal-title').innerText = 'Add New Item';
            document.getElementById('modal-form').innerHTML = `
                <label class="block text-sm font-bold mb-1">Text</label>
                <input type="text" id="edit-text" class="cms-input">
                <label class="block text-sm font-bold mb-1">Status</label>
                <select id="edit-status" class="cms-input">
                    <option value="done">Done</option>
                    <option value="now">Now</option>
                    <option value="ongoing">On-Going</option>
                    <option value="next">Next</option>
                    <option value="later">Later</option>
                </select>
                <label class="block text-sm font-bold mb-1">Contributors (comma separated)</label>
                <input type="text" id="edit-contributors" class="cms-input">
                <label class="block text-sm font-bold mb-1">Note</label>
                <textarea id="edit-note" class="cms-input"></textarea>
                <label class="block text-sm font-bold mb-1">Impact/Usecase</label>
                <input type="text" id="edit-usecase" class="cms-input">
                <label class="block text-sm font-bold mb-1">Due Date (Optional)</label>
                <input type="text" id="edit-due" class="cms-input">
            `;
            document.getElementById('cms-modal').classList.add('active');
        }

        function openMetadataEdit() {
            const meta = UPDATE_DATA.metadata;
            editContext = { type: 'metadata' };
            
            document.getElementById('modal-title').innerText = 'Edit Page Metadata';
            document.getElementById('modal-form').innerHTML = `
                <label class="block text-sm font-bold mb-1">Title</label>
                <input type="text" id="edit-title" value="${meta.title}" class="cms-input">
                <label class="block text-sm font-bold mb-1">Date Range</label>
                <input type="text" id="edit-dateRange" value="${meta.dateRange}" class="cms-input">
                <label class="block text-sm font-bold mb-1">Description</label>
                <input type="text" id="edit-description" value="${meta.description}" class="cms-input">
            `;
            document.getElementById('cms-modal').classList.add('active');
        }

        function saveCmsChanges() {
            if (editContext.type === 'item' || editContext.type === 'item-new') {
                const item = {
                    text: document.getElementById('edit-text').value,
                    status: document.getElementById('edit-status').value,
                    contributors: document.getElementById('edit-contributors').value.split(',').map(s => s.trim()).filter(s => s),
                    note: document.getElementById('edit-note').value,
                    usecase: document.getElementById('edit-usecase').value,
                    due: document.getElementById('edit-due').value,
                    publishedDate: new Date().toISOString().split('T')[0] // Auto-track publication date
                };
                
                if (!item.note) delete item.note;
                if (!item.usecase) delete item.usecase;
                if (!item.due) delete item.due;

                if (editContext.type === 'item') {
                    UPDATE_DATA.tracks[editContext.trackIndex].subtracks[editContext.subtrackIndex].items[editContext.itemIndex] = item;
                } else {
                    UPDATE_DATA.tracks[editContext.trackIndex].subtracks[editContext.subtrackIndex].items.push(item);
                }
            } else if (editContext.type === 'metadata') {
                UPDATE_DATA.metadata.title = document.getElementById('edit-title').value;
                UPDATE_DATA.metadata.dateRange = document.getElementById('edit-dateRange').value;
                UPDATE_DATA.metadata.description = document.getElementById('edit-description').value;
                
                // Update the page in real-time
                document.getElementById('page-title').textContent = UPDATE_DATA.metadata.title;
                document.getElementById('page-date').textContent = UPDATE_DATA.metadata.dateRange;
                document.getElementById('page-desc').textContent = UPDATE_DATA.metadata.description;
                document.getElementById('footer-text').textContent = `${UPDATE_DATA.metadata.title} • ${UPDATE_DATA.metadata.dateRange}`;
            }
            
            closeCmsModal();
            renderTrackView();
        }

        function closeCmsModal() {
            document.getElementById('cms-modal').classList.remove('active');
            editContext = null;
        }

        // Archive Management
        function initArchiveFilter() {
            const dates = new Set();
            let hasLegacy = false;
            
            UPDATE_DATA.tracks.forEach(track => {
                track.subtracks.forEach(subtrack => {
                    subtrack.items.forEach(item => {
                        if (item.publishedDate) {
                            const date = new Date(item.publishedDate);
                            const monthYear = date.toLocaleString('default', { month: 'short', year: 'numeric' });
                            dates.add(monthYear);
                        } else {
                            hasLegacy = true;
                        }
                    });
                });
            });

            const container = document.getElementById('archive-filter');
            let html = '<button onclick="filterByDate(\'all\')" class="archive-btn active">All Entries</button>';
            
            if (hasLegacy) {
                html += '<button onclick="filterByDate(\'Legacy\')" class="archive-btn">Legacy</button>';
            }

            Array.from(dates).sort((a, b) => new Date(b) - new Date(a)).forEach(date => {
                html += `<button onclick="filterByDate('${date}')" class="archive-btn">${date}</button>`;
            });
            container.innerHTML = html;
        }

        function filterByDate(dateRange) {
            window.currentDateFilter = dateRange;
            
            document.querySelectorAll('.archive-btn').forEach(btn => {
                const isMatch = (dateRange === 'all' && btn.innerText === 'All Entries') || 
                              (dateRange === 'Legacy' && btn.innerText === 'Legacy') ||
                              (btn.innerText === dateRange);
                btn.classList.toggle('active', isMatch);
            });

            const currentView = document.querySelector('.view-section.active').id.replace('-view', '');
            if (currentView === 'track') renderTrackView();
            if (currentView === 'status') renderStatusView();
            if (currentView === 'contributor') renderContributorView();
        }

        // Initialize
        window.onload = () => {
            initCms();
            renderTrackView();
        };
    </script>

    <!-- CMS Modal -->
    <div id="cms-modal" role="dialog">
        <div class="modal-content">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Edit Entry</h2>
            <div id="modal-form"></div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeCmsModal()" class="cms-btn cms-btn-secondary">Cancel</button>
                <button onclick="saveCmsChanges()" class="cms-btn cms-btn-primary">Apply Changes</button>
            </div>
        </div>
    </div>

    <!-- UI Layout -->
    <div class="max-w-7xl mx-auto">
        <!-- CMS Controls -->
        <div id="cms-controls">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">

                    <h2 class="text-lg font-bold mb-2">CMS Dashboard</h2>
                    <div id="cms-auth-section" class="flex gap-2">
                        <input type="password" id="github-token" placeholder="Enter GitHub PAT" class="cms-input" style="max-width: 300px; margin-bottom: 0;">
                        <button onclick="authenticateCms()" class="cms-btn cms-btn-primary">Authenticate</button>
                    </div>
                    <div id="cms-actions-section" class="hidden flex gap-2">
                        <span class="text-sm text-green-600 font-semibold flex items-center">Authenticated</span>
                        <button onclick="saveToGithub()" id="save-to-github-btn" class="cms-btn cms-btn-primary">Save to GitHub</button>
                        <button onclick="archiveAndClear()" id="archive-btn" class="cms-btn cms-btn-primary" style="background-color: #d97706;">Archive & Clear</button>
                        <button onclick="openMetadataEdit()" class="cms-btn cms-btn-secondary">Edit Metadata</button>
                        <button onclick="logoutCms()" class="cms-btn cms-btn-secondary">Logout</button>
                    </div>
                </div>
                <div id="cms-status" class="text-sm text-slate-500"></div>
            </div>
        </div>

        <!-- Header -->
        <div class="mb-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">

                    <h1 class="text-4xl font-bold text-slate-900 tracking-tight" id="page-title">Khyaal Engineering Update</h1>
                    <p class="text-slate-600 mt-2 text-lg" id="page-date">Feb 1 – Mar 18, 2026</p>
                    <p class="text-slate-500 text-sm mt-1" id="page-desc">Executive Update</p>
                </div>

                <div class="flex flex-col items-end gap-4">
                    <div class="view-toggle">
                        <button onclick="switchView('track')" id="btn-track" class="filter-btn active">By Track</button>
                        <button onclick="switchView('status')" id="btn-status" class="filter-btn">By Status</button>
                        <button onclick="switchView('contributor')" id="btn-contributor" class="filter-btn">By Contributor</button>
                    </div>
                </div>
            </div>

            <!-- Archive Filter -->
            <div id="archive-filter" class="archive-filter">

            </div>

            <!-- Legend -->
            <div class="flex gap-4 flex-wrap text-sm font-medium bg-white p-4 rounded-xl border border-slate-200 shadow-sm mb-12">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div><span class="text-slate-700">Done</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-blue-500"></div><span class="text-slate-700">Now</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-amber-500"></div><span class="text-slate-700">On-Going</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-orange-500"></div><span class="text-slate-700">Next</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-gray-500"></div><span class="text-slate-700">Later</span>
                </div>
            </div>
        </div>

        <!-- Views -->
        <div id="track-view" class="view-section active"></div>
        <div id="status-view" class="view-section"></div>
        <div id="contributor-view" class="view-section"></div>

        <!-- Footer -->
        <div class="text-center text-slate-400 text-sm py-8 mt-8 border-t border-slate-200">
            <p id="footer-text">Khyaal Engineering Update • Feb 1 – Mar 18, 2026</p>
            <!-- <p class="mt-1" id="footer-next">Next Review: April 1, 2026</p> -->
        </div>
    </div>

        document.getElementById('page-title').textContent = UPDATE_DATA.metadata.title;
        document.getElementById('page-date').textContent = UPDATE_DATA.metadata.dateRange;
        document.getElementById('page-desc').textContent = UPDATE_DATA.metadata.description;
