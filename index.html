                            // Wait for DOM to be ready and all scripts to be loaded

                                if (typeof initDashboard === 'function') initDashboard();
                            } else {

                                    if (typeof initDashboard === 'function') initDashboard();
                                });
                            }
                        })
                        .catch(e => console.log('Local load fallback:', e));

        <script>
            // Basic Auth Logic (Hash-based)
            const SITE_AUTH_KEY = 'khyaal_site_auth';
            // The URL of your AWS Lambda function (from deploy_auth.sh output)
            const LAMBDA_URL = 'https://3fbc33rf3a.execute-api.ap-south-1.amazonaws.com';


            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function checkBasicAuth(cachedHash = null) {
                const passwordInput = document.getElementById('site-password');
                const authMessage = document.getElementById('auth-message');
                let hashedInput;

                if (cachedHash) {
                    hashedInput = cachedHash;
                } else {
                    const password = passwordInput.value.trim();
                    if (!password) return;
                    hashedInput = await sha256(password);
                }

                const githubToken = localStorage.getItem('GITHUB_CMS_TOKEN') || '';

                if (!LAMBDA_URL) {
                    console.error('LAMBDA_URL is not set. Please run deploy_auth.sh and update the URL.');
                    alert('Authentication system is not yet configured. Please check the console for details.');
                    return;
                }

                try {
                    if (!cachedHash) authMessage.innerText = 'Authenticating...';

                    const response = await fetch(`${LAMBDA_URL}?cb=${Date.now()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            passwordHash: hashedInput,
                            githubToken: githubToken,
                            filePath: window.loadingArchive || 'data.json'
                        })
                    });

                    const result = await response.json();

                    if (result.authenticated && result.data) {
                        UPDATE_DATA = result.data; // Store the secure data in memory
                        localStorage.setItem(SITE_AUTH_KEY, hashedInput); // Store hash for persistence
                        showProtectedContent();
                    } else if (result.authenticated && result.error) {
                        // Correct password but token missing/invalid
                        authMessage.innerText = result.error + ' (Please set token in CMS settings)';
                    } else {
                        authMessage.innerText = 'Invalid password. Please try again.';
                        localStorage.removeItem(SITE_AUTH_KEY);
                    }
                } catch (error) {
                    console.error('Error during authentication:', error);
                    if (!cachedHash) alert('An error occurred during authentication. Please try again.');
                }
            }

            function showProtectedContent() {
                if (!UPDATE_DATA) return;

                document.getElementById('auth-loading').style.display = 'none';
                document.getElementById('auth-gatekeeper').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');

                // Initialize the modular dashboard
                initDashboard();
            }

            function logoutAll() {
                localStorage.removeItem(SITE_AUTH_KEY);
                localStorage.removeItem('gh_pat');
                location.reload();
            }

            // Auto-login if hash is cached (starts immediately for speed)
            const cachedHash = localStorage.getItem(SITE_AUTH_KEY);
            if (cachedHash) {
                checkBasicAuth(cachedHash);
            }

            // Standard initialization for other elements
            window.onload = () => {
                const urlParams = new URLSearchParams(window.location.search);
                const archiveFile = urlParams.get('archive');

                if (archiveFile) {
                    window.loadingArchive = archiveFile;
                    // If archive was specified in URL, we need to re-auth with it
                    if (cachedHash) checkBasicAuth(cachedHash);
                }
            };
        </script>
