        <script>
            // Global Auth & Load Orchestrator
            (function () {
                const SITE_AUTH_KEY = 'khyaal_site_auth';

                const initDashboardOrWait = () => {
                    if (document.readyState === 'complete' || document.readyState === 'interactive') {
                        if (typeof initDashboard === 'function') initDashboard();
                    } else {
                        window.addEventListener('DOMContentLoaded', () => {
                            if (typeof initDashboard === 'function') initDashboard();
                        });
                    }
                };

                const initLocalLoad = () => {
                    // 🏆 Phase 33: Archive Context Isolation
                    // If viewing an archive, ignore LocalStorage to ensure historical accuracy
                    const params = new URLSearchParams(window.location.search);
                    const isArchive = params.get('archive');
                    const cachedData = !isArchive ? localStorage.getItem(`khyaal_data_${window.ACTIVE_PROJECT_ID || 'default'}`) : null;

                    if (cachedData) {
                        try {
                            window.UPDATE_DATA = JSON.parse(cachedData);
                            console.log('✅ Session Synced: Prioritizing local data state');
                            initDashboardOrWait();
                            return; 
                        } catch (e) {
                            console.error('LocalStorage Data Corrupt, falling back to data.json');
                        }
                    }

                    // Only attempt the direct file fetch for the legacy default project.
                    // Non-default projects must load via Lambda (requires auth), so we
                    // defer to the full auth path rather than loading wrong project data.
                    const activeProject = window.ACTIVE_PROJECT_ID || 'default'
                    if (activeProject === 'default') {
                        fetch('./data.json?v=' + Date.now())
                            .then(r => r.json())
                            .then(data => {
                                window.UPDATE_DATA = data;
                                console.log('✅ Server Synced: Initializing from data.json');
                                initDashboardOrWait();
                            })
                            .catch(e => console.log('Critical load error:', e));
                    }
                    // else: non-default project — full auth path in checkBasicAuth() will load correct data
                };

                // Early boot: try local cache for instant render while full auth proceeds
                if (localStorage.getItem(SITE_AUTH_KEY)) {
                    initLocalLoad();
                }
            })();
        </script>

        <script>
            // Basic Auth Logic (Hash-based)
            const SITE_AUTH_KEY = 'khyaal_site_auth';
            // The URL of your AWS Lambda function (from deploy_auth.sh output)
            const LAMBDA_URL = 'https://3fbc33rf3a.execute-api.ap-south-1.amazonaws.com';


            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function checkBasicAuth(cachedSession = null) {
                const passwordInput = document.getElementById('site-password');
                const usernameInput = document.getElementById('site-username');
                const authMessage = document.getElementById('auth-message');

                if (!LAMBDA_URL) {
                    console.error('LAMBDA_URL is not set. Please run deploy_auth.sh and update the URL.');
                    alert('Authentication system is not yet configured. Please check the console for details.');
                    return;
                }

                // ── Fast path: restore from cached JWT ───────────────────
                if (cachedSession) {
                    // cachedSession is a stored JWT string
                    try {
                        // Decode payload (no verify here — Lambda verifies on read)
                        const parts = cachedSession.split('.');
                        if (parts.length === 3) {
                            const claims = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
                            if (claims.exp > Math.floor(Date.now() / 1000)) {
                                // Token still valid — restore session from claims
                                window.CURRENT_USER = { name: claims.name, grants: claims.grants || [] };
                                window.PROJECT_REGISTRY = (claims.grants || []).map(g => ({
                                    id: g.projectId,
                                    name: g.name || (g.projectId === 'default' ? 'Khyaal Engineering' : g.projectId),
                                    filePath: g.projectId !== 'default' ? `data-${g.projectId}.json` : 'data.json',
                                    maxMode: g.mode
                                }));
                                window.ACTIVE_PROJECT_ID = (claims.grants || [])[0]?.projectId || 'default';

                                // Fetch fresh data using the cached JWT
                                const readResp = await fetch(`${LAMBDA_URL}?action=read&projectId=${window.ACTIVE_PROJECT_ID}&cb=${Date.now()}`, {
                                    headers: { 'Authorization': `Bearer ${cachedSession}` }
                                });
                                if (readResp.ok) {
                                    const { data } = await readResp.json();
                                    // Prefer local edits over server if cached data exists
                                    const urlParams = new URL(window.location.href).searchParams;
                                    const isArchive = urlParams.get('archive');
                                    const localKey = `khyaal_data_${window.ACTIVE_PROJECT_ID}`;
                                    const cachedData = !isArchive ? localStorage.getItem(localKey) : null;
                                    if (cachedData) {
                                        try {
                                            window.UPDATE_DATA = JSON.parse(cachedData);
                                            console.log('✅ Auth Reconciled: Prioritizing local edits over server data');
                                        } catch (e) {
                                            window.UPDATE_DATA = data;
                                        }
                                    } else {
                                        window.UPDATE_DATA = data;
                                    }
                                    showProtectedContent();
                                    return;
                                }
                                // If read fails (403/401), fall through to full re-auth
                            }
                        }
                    } catch (e) {
                        console.warn('Cached session invalid, re-authenticating...', e);
                    }
                    // Cached token invalid or expired — clear and show login form
                    localStorage.removeItem(SITE_AUTH_KEY);
                    document.getElementById('auth-loading').style.display = 'none';
                    document.getElementById('auth-gatekeeper').classList.remove('hidden');
                    return;
                }

                // ── Full auth: username + password → JWT ─────────────────
                const username = usernameInput ? usernameInput.value.trim() : '';
                const password = passwordInput ? passwordInput.value.trim() : '';
                if (!username || !password) {
                    authMessage.innerText = 'Please enter your username and password.';
                    return;
                }
                const passwordHash = await sha256(password);

                try {
                    authMessage.innerText = 'Authenticating...';

                    const authResp = await fetch(`${LAMBDA_URL}?action=auth&cb=${Date.now()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, passwordHash })
                    });
                    const authResult = await authResp.json();

                    if (!authResult.authenticated) {
                        authMessage.innerText = authResult.error || 'Invalid credentials. Please try again.';
                        localStorage.removeItem(SITE_AUTH_KEY);
                        return;
                    }

                    // Store JWT + restore user state
                    const jwt = authResult.token;
                    localStorage.setItem(SITE_AUTH_KEY, jwt);
                    window.CURRENT_USER = { name: authResult.name, grants: authResult.grants || [] };
                    window.PROJECT_REGISTRY = (authResult.grants || []).map(g => ({
                        id: g.projectId,
                        name: g.name || (g.projectId === 'default' ? 'Khyaal Engineering' : g.projectId),
                        filePath: g.projectId !== 'default' ? `data-${g.projectId}.json` : 'data.json',
                        maxMode: g.mode
                    }));
                    window.ACTIVE_PROJECT_ID = (authResult.grants || [])[0]?.projectId || 'default';

                    // Fetch project data
                    const readResp = await fetch(`${LAMBDA_URL}?action=read&projectId=${window.ACTIVE_PROJECT_ID}&cb=${Date.now()}`, {
                        headers: { 'Authorization': `Bearer ${jwt}` }
                    });
                    if (!readResp.ok) {
                        authMessage.innerText = 'Auth succeeded but data fetch failed. Please reload.';
                        return;
                    }
                    const { data } = await readResp.json();
                    window.UPDATE_DATA = data;
                    authMessage.innerText = '';
                    showProtectedContent();

                } catch (error) {
                    console.error('Error during authentication:', error);
                    authMessage.innerText = 'An error occurred during authentication. Please try again.';
                }
            }

            function showProtectedContent() {
                if (!UPDATE_DATA) return;
                document.getElementById('auth-loading').style.display = 'none';
                document.getElementById('auth-gatekeeper').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                // Ensure modular initialization
                if (typeof initDashboard === 'function') initDashboard();
            }

            function logoutAll() {
                localStorage.removeItem(SITE_AUTH_KEY);
                window.CURRENT_USER = null;
                location.reload();
            }

            // Auto-login if JWT is cached (starts immediately for speed)
            const cachedSession = localStorage.getItem(SITE_AUTH_KEY);
            if (cachedSession) {
                checkBasicAuth(cachedSession);
            } else {
                // No session — show login form
                document.getElementById('auth-loading').style.display = 'none';
                document.getElementById('auth-gatekeeper').classList.remove('hidden');
            }
        </script>
